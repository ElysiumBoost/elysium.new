<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Elysium Boost</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/core/config.js"></script>
<style>
:root{--gold:#c9a84c;--gold-b:#e5c26b;--gold-d:#8a6f32;--text:#efe6cf;--text-d:#8a7d5e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#0a0805 url('assets/backgrounds/elyssunset.webp') center/cover no-repeat;display:flex;align-items:center;justify-content:center;padding:1rem;font-family:'Plus Jakarta Sans',sans-serif;}
body::before{content:'';position:fixed;inset:0;background:rgba(10,8,5,0.85);}
.card{position:relative;z-index:1;width:100%;max-width:400px;background:linear-gradient(160deg,#1c1609 0%,#120e07 50%,#0a0805 100%);border:1px solid rgba(201,168,76,0.22);border-radius:3px;overflow:hidden;}
.top-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-b),var(--gold),transparent);}
.body{padding:2.25rem 2rem;}
.logo{display:flex;justify-content:center;margin-bottom:1.25rem;}
.logo img{width:56px;height:56px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(201,168,76,0.3));}
h1{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--text);letter-spacing:0.04em;text-align:center;margin-bottom:6px;}
.sub{font-size:13px;color:var(--text-d);text-align:center;margin-bottom:1.75rem;}
.field{margin-bottom:1.1rem;}
.field label{display:block;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-d);margin-bottom:5px;font-family:'Rajdhani',sans-serif;font-weight:600;}
.field input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.15);border-radius:2px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:rgba(201,168,76,0.45);}
.field input::placeholder{color:rgba(239,230,207,0.2);}
.pass-wrap{position:relative;}.pass-wrap input{padding-right:44px;}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;padding:0;color:var(--text-d);cursor:pointer;display:flex;align-items:center;}
.cta{width:100%;margin-top:1.25rem;background:linear-gradient(90deg,#8a6f32,var(--gold),var(--gold-b),var(--gold),#8a6f32);background-size:200% 100%;border:none;border-radius:2px;padding:12px 0;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#0a0805;cursor:pointer;transition:background-position 0.5s;}
.cta:hover{background-position:100% 0;}.cta:disabled{opacity:0.6;cursor:not-allowed;}
.msg{font-size:12px;padding:8px 12px;border-radius:2px;margin-top:10px;display:none;}
.msg.error{display:block;color:#f4a261;border:1px solid rgba(244,162,97,0.25);background:rgba(244,162,97,0.05);}
.msg.success{display:block;color:var(--gold-b);border:1px solid rgba(201,168,76,0.25);background:rgba(201,168,76,0.05);}
.back{display:block;text-align:center;margin-top:1.25rem;font-size:12px;color:var(--text-d);text-decoration:none;}
.back:hover{color:var(--gold);}
</style>
</head>
<body>
<div class="card">
  <div class="top-line"></div>
  <div class="body">
    <div class="logo"><img src="assets/elysium-logo-mark.png" alt="Elysium Boost"></div>
    <h1>Set New Password</h1>
    <p class="sub">Choose a strong password for your account.</p>
    <div class="field"><label>New Password</label><div class="pass-wrap"><input type="password" id="newPass" placeholder="Min. 8 characters"><button class="pass-eye" onclick="togglePass('newPass',this)" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
    <div class="field"><label>Confirm Password</label><div class="pass-wrap"><input type="password" id="confirmPass" placeholder="Repeat password"><button class="pass-eye" onclick="togglePass('confirmPass',this)" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
    <button class="cta" id="resetBtn" onclick="handleReset()">Update Password</button>
    <div class="msg" id="resetMsg"></div>
    <a class="back" href="index.html">← Back to Elysium</a>
  </div>
</div>
<script>
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {auth:{detectSessionInUrl:true}});
async function handleReset(){const pass=document.getElementById('newPass').value;const confirm=document.getElementById('confirmPass').value;const btn=document.getElementById('resetBtn');if(pass.length<8)return showMsg('error','Password must be at least 8 characters.');if(pass!==confirm)return showMsg('error','Passwords do not match.');btn.disabled=true;btn.textContent='Updating…';const{error}=await _sb.auth.updateUser({password:pass});btn.disabled=false;btn.textContent='Update Password';if(error){showMsg('error',error.message);return;}showMsg('success','Password updated! Redirecting…');setTimeout(()=>{window.location.href='index.html';},2000);}
function showMsg(t,txt){const el=document.getElementById('resetMsg');el.textContent=txt;el.className=`msg ${t}`;}
function togglePass(id,btn){const inp=document.getElementById(id);const show=inp.type==='password';inp.type=show?'text':'password';btn.innerHTML=show?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';}
</script>
</body>
</html>
