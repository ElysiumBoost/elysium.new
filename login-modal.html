<!--
  ═══════════════════════════════════════════════════════════
  ELYSIUM BOOST — Login Modal
  Yapıştır: </body> öncesine, her sayfada
  ═══════════════════════════════════════════════════════════
-->
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{--gold:#c9a84c;--gold-b:#e5c26b;--gold-d:#8a6f32;--text:#efe6cf;--text-d:#8a7d5e;--f-display:'Rajdhani',sans-serif;--f-body:'Plus Jakarta Sans',sans-serif;}

.eb-modal-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1rem;animation:ebFadeIn 0.2s ease;}
.eb-modal-overlay.eb-hidden{display:none;}
@keyframes ebFadeIn{from{opacity:0}to{opacity:1}}
@keyframes ebSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Background image inside overlay */
.eb-modal-overlay::before{content:'';position:absolute;inset:0;background:url('assets/backgrounds/elyssunset.webp') center/cover no-repeat;opacity:0.12;pointer-events:none;}

.eb-modal{position:relative;width:100%;max-width:420px;background:linear-gradient(160deg,#1c1609 0%,#120e07 50%,#0a0805 100%);border:1px solid rgba(201,168,76,0.25);border-radius:3px;overflow:hidden;animation:ebSlideUp 0.28s ease;font-family:var(--f-body);}
.eb-top-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-b),var(--gold),transparent);}
.eb-corner{position:absolute;width:14px;height:14px;}
.eb-corner-tl{top:0;left:0;border-top:1px solid var(--gold);border-left:1px solid var(--gold);}
.eb-corner-tr{top:0;right:0;border-top:1px solid var(--gold);border-right:1px solid var(--gold);}
.eb-corner-bl{bottom:0;left:0;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);}
.eb-corner-br{bottom:0;right:0;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);}

.eb-close{position:absolute;top:14px;right:14px;width:28px;height:28px;background:rgba(239,230,207,0.05);border:1px solid rgba(201,168,76,0.15);border-radius:50%;color:var(--text-d);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;transition:all 0.2s;}
.eb-close:hover{border-color:var(--gold-d);color:var(--gold);}

.eb-body{padding:2.25rem 2rem 1.75rem;position:relative;z-index:5;}

/* Logo */
.eb-logo-wrap{display:flex;justify-content:center;margin-bottom:1.1rem;}
.eb-logo-img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(201,168,76,0.3));}

.eb-title{font-family:var(--f-display);font-size:26px;font-weight:700;color:var(--text);letter-spacing:0.04em;text-align:center;margin:0 0 6px;}
.eb-sub{font-size:13px;color:var(--text-d);text-align:center;line-height:1.6;margin:0 0 1.75rem;}

/* OAuth Buttons */
.eb-auth-btn{width:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 16px;border-radius:2px;font-family:var(--f-body);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-bottom:10px;border:1px solid rgba(239,230,207,0.1);background:rgba(239,230,207,0.04);color:var(--text);}
.eb-auth-btn:hover{background:rgba(239,230,207,0.08);border-color:rgba(239,230,207,0.18);}
.eb-auth-btn.google{border-color:rgba(234,67,53,0.3);background:rgba(234,67,53,0.07);}
.eb-auth-btn.google:hover{background:rgba(234,67,53,0.12);border-color:rgba(234,67,53,0.45);}
.eb-auth-btn.apple{border-color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);}
.eb-auth-btn.apple:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.22);}
.eb-auth-btn.discord{border-color:rgba(88,101,242,0.3);background:rgba(88,101,242,0.07);color:#9fa5f7;}
.eb-auth-btn.discord:hover{background:rgba(88,101,242,0.13);border-color:rgba(88,101,242,0.5);}
.eb-auth-btn.email{border-color:rgba(201,168,76,0.2);background:rgba(201,168,76,0.04);color:var(--text-d);}
.eb-auth-btn.email:hover{background:rgba(201,168,76,0.08);border-color:rgba(201,168,76,0.35);color:var(--text);}
.eb-btn-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.eb-btn-label{flex:1;text-align:center;margin-right:20px;}

/* Divider */
.eb-divider{display:flex;align-items:center;gap:10px;margin:4px 0 10px;}
.eb-div-line{flex:1;height:1px;background:rgba(201,168,76,0.1);}
.eb-div-txt{font-size:11px;color:var(--text-d);letter-spacing:0.08em;text-transform:uppercase;}

/* Email view */
.eb-email-view{display:none;}
.eb-back{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-display);font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-d);cursor:pointer;background:none;border:none;padding:0;margin-bottom:1.25rem;transition:color 0.2s;}
.eb-back:hover{color:var(--gold);}
.eb-tabs{display:flex;border-bottom:1px solid rgba(201,168,76,0.12);margin-bottom:1.5rem;}
.eb-tab{flex:1;text-align:center;padding:9px 0;font-family:var(--f-display);font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-d);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.2s,border-color 0.2s;}
.eb-tab.active{color:var(--gold-b);border-bottom-color:var(--gold);}
.eb-panel{display:none;}.eb-panel.active{display:block;}
.eb-field{margin-bottom:1.1rem;}
.eb-field label{display:block;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-d);margin-bottom:5px;font-family:var(--f-display);font-weight:600;}
.eb-field input{width:100%;box-sizing:border-box;background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.15);border-radius:2px;padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--f-body);outline:none;transition:border-color 0.2s,background 0.2s;}
.eb-field input:focus{border-color:rgba(201,168,76,0.45);background:rgba(201,168,76,0.03);}
.eb-field input::placeholder{color:rgba(239,230,207,0.2);font-size:13px;}
.eb-pass-wrap{position:relative;}.eb-pass-wrap input{padding-right:44px;}
.eb-pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;padding:0;color:var(--text-d);cursor:pointer;display:flex;align-items:center;transition:color 0.2s;}
.eb-pass-eye:hover{color:var(--gold);}
.eb-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.eb-forgot{text-align:right;margin-top:-8px;margin-bottom:4px;}
.eb-forgot button{font-size:11px;color:var(--gold-d);letter-spacing:0.06em;text-transform:uppercase;background:none;border:none;cursor:pointer;transition:color 0.2s;padding:0;}
.eb-forgot button:hover{color:var(--gold);}
.eb-cta{width:100%;margin-top:1.25rem;background:linear-gradient(90deg,#8a6f32,var(--gold),var(--gold-b),var(--gold),#8a6f32);background-size:200% 100%;border:none;border-radius:2px;padding:12px 0;font-family:var(--f-display);font-size:14px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#0a0805;cursor:pointer;transition:background-position 0.5s,opacity 0.2s;}
.eb-cta:hover{background-position:100% 0;}.eb-cta:disabled{opacity:0.6;cursor:not-allowed;}
.eb-msg{font-size:12px;padding:8px 12px;border-radius:2px;margin-top:10px;display:none;}
.eb-msg.eb-error{display:block;color:#f4a261;border:1px solid rgba(244,162,97,0.25);background:rgba(244,162,97,0.05);}
.eb-msg.eb-success{display:block;color:var(--gold-b);border:1px solid rgba(201,168,76,0.25);background:rgba(201,168,76,0.05);}
.eb-shields{display:flex;gap:14px;margin-top:1.25rem;}
.eb-shield{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-d);}
.eb-shield-dot{width:4px;height:4px;border-radius:50%;background:var(--gold-d);flex-shrink:0;}

/* Footer */
.eb-footer{position:relative;z-index:5;border-top:1px solid rgba(201,168,76,0.08);padding:.875rem 2rem;}
.eb-footer-txt{font-size:11px;color:var(--text-d);letter-spacing:0.05em;text-align:center;margin:0;}
.eb-footer-txt a{color:var(--gold-d);text-decoration:none;}.eb-footer-txt a:hover{color:var(--gold);}

@media(max-width:480px){.eb-body{padding:2rem 1.25rem 1.5rem;}.eb-footer{padding:.875rem 1.25rem;}.eb-row2{grid-template-columns:1fr;}}
</style>

<div class="eb-modal-overlay eb-hidden" id="ebModal" onclick="ebCloseOnOverlay(event)">
  <div class="eb-modal" role="dialog" aria-modal="true" aria-labelledby="ebTitle">
    <div class="eb-corner eb-corner-tl"></div><div class="eb-corner eb-corner-tr"></div>
    <div class="eb-corner eb-corner-bl"></div><div class="eb-corner eb-corner-br"></div>
    <div class="eb-top-line"></div>
    <button class="eb-close" onclick="ebClose()" aria-label="Close">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
    </button>

    <div class="eb-body">
      <!-- Logo -->
      <div class="eb-logo-wrap">
        <img src="assets/elysium-logo-mark.png" alt="Elysium Boost" class="eb-logo-img">
      </div>

      <!-- OAuth View -->
      <div id="ebOAuthView">
        <h2 class="eb-title" id="ebTitle">Welcome Back</h2>
        <p class="eb-sub">Sign in to manage orders, continue checkout,<br>and keep your preferences synced.</p>

        <button class="eb-auth-btn google" onclick="ebAuthGoogle()">
          <span class="eb-btn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg></span>
          <span class="eb-btn-label">Continue with Google</span>
        </button>

        <button class="eb-auth-btn apple" onclick="ebAuthApple()">
          <span class="eb-btn-icon"><svg width="16" height="19" viewBox="0 0 814 1000" fill="currentColor"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-47.4-150.2-115C59.6 807.5 15.8 687.8 15.8 573.6c0-209.9 137.3-321 272.4-321 70.1 0 128.4 46.2 172.4 46.2 42.2 0 108.6-49.4 190.1-49.4zm-218.3-72.8c-32.5-38.8-77.3-67.3-127.6-67.3-59.5 0-113.2 37.7-147.6 96.5C260.3 360 243 432 243 502c0 70 17.3 142 51.7 201 32.5 57 76 89 127.6 89 51.7 0 97.4-33.3 147.6-33.3 52.2 0 95.5 33.3 147.6 33.3 51.7 0 97.4-32 129.9-89 17.3-29.6 28.9-60.6 36.6-90.9-101.7-37.7-117.2-176.1-117.2-248.2 0-65.8 35.3-160.1 106.3-213.2z"/></svg></span>
          <span class="eb-btn-label">Continue with Apple</span>
        </button>

        <button class="eb-auth-btn discord" onclick="ebAuthDiscord()">
          <span class="eb-btn-icon"><svg width="20" height="15" viewBox="0 0 24 18" fill="currentColor"><path d="M20.317 1.492a19.825 19.825 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 1.492a.07.07 0 00-.032.027C.533 6.093-.32 10.555.099 14.961a.08.08 0 00.031.055 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.1.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg></span>
          <span class="eb-btn-label">Continue with Discord</span>
        </button>

        <div class="eb-divider"><div class="eb-div-line"></div><div class="eb-div-txt">or</div><div class="eb-div-line"></div></div>

        <button class="eb-auth-btn email" onclick="ebShowEmailPanel()">
          <span class="eb-btn-icon"><svg width="18" height="14" viewBox="0 0 24 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="22" height="16" rx="2"/><polyline points="1,3 12,13 23,3"/></svg></span>
          <span class="eb-btn-label">Continue with Email</span>
        </button>
      </div>

      <!-- Email View -->
      <div id="ebEmailView" class="eb-email-view">
        <button class="eb-back" onclick="ebShowOAuthPanel()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="15,18 9,12 15,6"/></svg>
          All sign-in options
        </button>
        <div class="eb-tabs">
          <button class="eb-tab active" id="ebTabSignIn" onclick="ebEmailTab('signin')">Sign In</button>
          <button class="eb-tab" id="ebTabSignUp" onclick="ebEmailTab('signup')">Create Account</button>
        </div>

        <div class="eb-panel active" id="ebSignInPanel">
          <div class="eb-field"><label>Email</label><input type="email" id="siEmail" placeholder="you@example.com" autocomplete="email"></div>
          <div class="eb-field"><label>Password</label><div class="eb-pass-wrap"><input type="password" id="siPass" placeholder="••••••••" autocomplete="current-password"><button class="eb-pass-eye" onclick="ebTogglePass('siPass',this)" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
          <div class="eb-forgot"><button type="button" onclick="ebForgotPassword(document.getElementById('siEmail').value)">Forgot password?</button></div>
          <button class="eb-cta" id="ebEmailCta" onclick="ebAuthEmailSignIn(document.getElementById('siEmail').value,document.getElementById('siPass').value)">Enter the Realm</button>
          <div class="eb-msg" id="ebEmailMsg"></div>
          <div class="eb-shields"><div class="eb-shield"><div class="eb-shield-dot"></div>Manual Only</div><div class="eb-shield"><div class="eb-shield-dot"></div>Zero Bans</div><div class="eb-shield"><div class="eb-shield-dot"></div>Encrypted</div></div>
        </div>

        <div class="eb-panel" id="ebSignUpPanel">
          <div class="eb-row2"><div class="eb-field"><label>Username</label><input type="text" id="suUsername" placeholder="GrandSlayer"></div><div class="eb-field"><label>Discord ID</label><input type="text" id="suDiscord" placeholder="user#0000"></div></div>
          <div class="eb-field"><label>Email</label><input type="email" id="suEmail" placeholder="you@example.com" autocomplete="email"></div>
          <div class="eb-field"><label>Password</label><div class="eb-pass-wrap"><input type="password" id="suPass" placeholder="Min. 8 characters" autocomplete="new-password"><button class="eb-pass-eye" onclick="ebTogglePass('suPass',this)" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
          <button class="eb-cta" id="ebSignUpCta" onclick="ebAuthEmailSignUp(document.getElementById('suEmail').value,document.getElementById('suPass').value,{username:document.getElementById('suUsername').value,discord_id:document.getElementById('suDiscord').value})">Join the Realm</button>
          <div class="eb-msg" id="ebSignUpMsg"></div>
          <div class="eb-shields"><div class="eb-shield"><div class="eb-shield-dot"></div>Manual Only</div><div class="eb-shield"><div class="eb-shield-dot"></div>Zero Bans</div><div class="eb-shield"><div class="eb-shield-dot"></div>Encrypted</div></div>
        </div>
      </div>
    </div>

    <div class="eb-footer">
      <p class="eb-footer-txt">By continuing you agree to our <a href="/terms">Terms</a> &amp; <a href="/privacy">Privacy Policy</a></p>
    </div>
  </div>
</div>

<script>
function ebShowEmailPanel(){document.getElementById('ebOAuthView').style.display='none';document.getElementById('ebEmailView').style.display='block';}
function ebShowOAuthPanel(){document.getElementById('ebEmailView').style.display='none';document.getElementById('ebOAuthView').style.display='';}
function ebEmailTab(t){const isIn=t==='signin';document.getElementById('ebTabSignIn').classList.toggle('active',isIn);document.getElementById('ebTabSignUp').classList.toggle('active',!isIn);document.getElementById('ebSignInPanel').classList.toggle('active',isIn);document.getElementById('ebSignUpPanel').classList.toggle('active',!isIn);}
function ebTogglePass(id,btn){const inp=document.getElementById(id);const show=inp.type==='password';inp.type=show?'text':'password';btn.innerHTML=show?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';}
</script>
